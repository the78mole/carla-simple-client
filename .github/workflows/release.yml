name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.9.16 or leave empty for auto)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: semver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            # Get latest tag or default to v0.9.16
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.9.16")
            VERSION="${LATEST_TAG#v}"
            TAG="${LATEST_TAG}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} (tag: ${TAG})"

  build:
    name: Build Release Artifacts
    needs: calculate-version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      upload-artifacts: true

  create-release:
    name: Create GitHub Release
    needs: [calculate-version, build]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Collect C++ clients
          find artifacts -name "cpp_client" -type f -exec cp {} release-assets/ \;
          
          # Collect wheels
          find artifacts -name "*.whl" -type f -exec cp {} release-assets/ \;
          
          # Rename C++ clients with architecture suffix
          cd release-assets
          for file in cpp_client*; do
            if [ -f "$file" ]; then
              # Determine architecture from parent directory
              arch=$(echo "$file" | grep -oP '(x86_64|aarch64|arm64)' || echo "unknown")
              mv "$file" "cpp_client-${arch}"
            fi
          done
          
          ls -lah

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-version.outputs.tag }}
          name: Release ${{ needs.calculate-version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.calculate-version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*

      - name: Publish to PyPI
        if: ${{ !env.ACT && !contains(needs.calculate-version.outputs.version, '-') }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload release-assets/*.whl

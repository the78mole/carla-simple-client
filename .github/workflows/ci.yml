name: CI

on:
  push:
    branches: [main, copilot/*]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # Python 3.8 not available on macos-15 ARM
          - os: macos-15
            python-version: '3.8'

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          if [ -n "$ACT" ]; then
            uv pip install -e ".[dev]"
          else
            uv pip install -e ".[dev]" --system
          fi

      - name: Run linting
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Run tests
        run: uv run pytest tests/ -v

  build-cpp:
    name: Build C++ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        arch: [x86_64]
        include:
          - os: ubuntu-24.04
            arch: aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git wget \
            libpng-dev libtiff-dev libjpeg-dev \
            python3-dev python3-pip \
            autoconf automake libtool

      - name: Install cross-compiler (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup dependencies
        run: ./scripts/setup-dependencies.sh

      - name: Build (native)
        if: matrix.arch == 'x86_64'
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja \
            -DPNG_PNG_INCLUDE_DIR="${PWD}/../deps/install/libcarla-client/include/system" \
            -DPNG_LIBRARY="${PWD}/../deps/install/libcarla-client/lib/libpng.a" \
            ..
          ninja

      - name: Build (cross-compile ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          mkdir -p build-arm64
          cd build-arm64
          cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-arm64.cmake \
            -DPNG_PNG_INCLUDE_DIR="${PWD}/../deps/install/libcarla-client/include/system" \
            -DPNG_LIBRARY="${PWD}/../deps/install/libcarla-client/lib/libpng.a" \
            ..
          ninja

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: cpp-client-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build*/examples/cpp_client/carla_cpp_client
            deps/install/libcarla-client/

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]

    steps:
      - name: Skip macOS in act
        if: ${{ env.ACT && matrix.os == 'macos-15' }}
        run: |
          echo "Skipping macOS build in act environment"
          exit 0

      - uses: actions/checkout@v6
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}

      - name: Set up QEMU (for ARM64 builds on Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT && matrix.os != 'macos-15' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels (act - x86_64 only)
        if: ${{ env.ACT && matrix.os != 'macos-15' }}
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import carla; print('Import successful')"

      - name: Build wheels (CI - all architectures)
        if: ${{ !env.ACT && matrix.os != 'macos-15' }}
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64 aarch64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import carla; print('Import successful')"

      - name: Upload wheels
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

name: CI

on:
  push:
    branches: [main, copilot/*]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # Python 3.8 not available on macos-15 ARM
          - os: macos-15
            python-version: '3.8'

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git wget \
            libpng-dev libtiff-dev libjpeg-dev \
            python3-dev python3-pip \
            autoconf automake libtool

      - name: Build dependencies
        run: ./scripts/setup-dependencies.sh
    
      - name: Install Python package  
        run: |
          if [ -n "$ACT" ]; then
            uv pip install -e ".[dev]"
          else
            uv pip install -e ".[dev]" --system
          fi

      - name: Run linting
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Run tests
        run: uv run pytest tests/ -v

  build-cpp:
    name: Build C++ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        arch: [x86_64]
        include:
          - os: ubuntu-24.04
            arch: aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git wget \
            libpng-dev libtiff-dev libjpeg-dev \
            python3-dev python3-pip \
            autoconf automake libtool

      - name: Install cross-compiler (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Docker (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          # Docker is needed for ARM64 cross-compilation
          sudo apt-get install -y docker.io
          sudo systemctl start docker || true
          sudo usermod -aG docker $USER || true

      - name: Build C++ client (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          echo "PWD: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "Makefile exists: $(ls -la Makefile 2>/dev/null || echo 'NOT FOUND')"
          echo "Files in current dir: $(ls -la | head -20)"
          cd $GITHUB_WORKSPACE || cd /home/daniel/GIT/carla-simple-client
          echo "After cd PWD: $(pwd)"
          echo "Makefile after cd: $(ls -la Makefile 2>/dev/null || echo 'NOT FOUND')"
          make build-x86_64

      - name: Build C++ client (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          cd $GITHUB_WORKSPACE
          # Build Docker image first for ARM64 cross-compilation
          docker build -t carla-arm64-builder:latest build-containers/x86_64-cross-arm64-ubuntu-22.04/
          make build-arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: cpp-client-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            examples/cpp_client/cpp_client
            build/aarch64/cpp_client/cpp_client

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]

    steps:
      - name: Skip macOS in act
        if: ${{ env.ACT && matrix.os == 'macos-15' }}
        run: |
          echo "Skipping macOS build in act environment"
          exit 0

      - uses: actions/checkout@v6
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}

      - name: Set up QEMU (for ARM64 builds on Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT && matrix.os != 'macos-15' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build dependencies (for real CI)
        if: ${{ !env.ACT }}
        run: ./scripts/setup-dependencies.sh
        
      - name: Build wheels (act - skip complex wheel building)
        if: ${{ env.ACT }}
        run: |
          echo "Skipping wheel building in act environment"
          echo "Reason: manylinux containers have limited build tools"
          echo "Wheel building works correctly on real GitHub Actions"
          mkdir -p wheelhouse
          echo "act test passed" > wheelhouse/.keep

      - name: Build wheels (CI - all architectures)
        if: ${{ !env.ACT && matrix.os != 'macos-15' }}
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64 aarch64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import carla; print('Import successful')"

      - name: Upload wheels
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

name: CI

on:
  push:
  pull_request:

jobs:
  lint-python:
    name: Lint Python on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv

      - name: Install dev dependencies
        run: uv pip install ruff black

      - name: Run linting
        run: |
          uv run ruff check .
          uv run black --check .

  build-cpp:
    name: Build C++ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        arch: [x86_64]
        include:
          - os: ubuntu-22.04
            arch: aarch64
          - os: ubuntu-24.04
            arch: aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git wget \
            libpng-dev libtiff-dev libjpeg-dev \
            python3-dev python3-pip \
            autoconf automake libtool

      - name: Install cross-compiler (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Docker (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          # Docker is needed for ARM64 cross-compilation
          # Remove conflicting packages first
          sudo apt-get remove -y containerd runc || true
          sudo apt-get install -y docker.io
          sudo systemctl start docker || true
          sudo usermod -aG docker $USER || true

      - name: Build dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        run: ./scripts/setup-dependencies.sh

      - name: Build C++ client (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          # Build LibCarla
          mkdir -p build/x86_64/libcarla
          cd build/x86_64/libcarla
          cmake ../../../LibCarla/cmake \
            -DCMAKE_BUILD_TYPE=Client \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DLIBCARLA_BUILD_RELEASE=ON \
            -DLIBCARLA_BUILD_DEBUG=OFF \
            -DLIBCARLA_BUILD_TEST=OFF \
            -G Ninja
          ninja install
          cd ../../..
          
          # Build third-party libs
          mkdir -p build/x86_64/third-party
          cd build/x86_64/third-party
          g++ -std=c++14 -fPIC -O3 -DNDEBUG \
            -c ../../../LibCarla/source/third-party/odrSpiral/odrSpiral.cpp -o odrSpiral.o
          g++ -std=c++14 -fPIC -O3 -DNDEBUG \
            -c ../../../LibCarla/source/third-party/pugixml/pugixml.cpp -o pugixml.o
          ar rcs libcarla_third_party.a odrSpiral.o pugixml.o
          cd ../../..
          
          # Build example
          cd examples/cpp_client
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          ninja

      - name: Build C++ client (ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          cd $GITHUB_WORKSPACE
          # Build Docker image first for ARM64 cross-compilation
          docker build -t carla-arm64-builder:latest $GITHUB_WORKSPACE/build-containers/x86_64-cross-arm64-ubuntu-22.04/
          make build-arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: cpp-client-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            examples/cpp_client/cpp_client
            build/aarch64/cpp_client/cpp_client

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]

    steps:
      - name: Skip macOS in act
        if: ${{ env.ACT && matrix.os == 'macos-15' }}
        run: |
          echo "Skipping macOS build in act environment"
          exit 0

      - uses: actions/checkout@v6
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}

      - name: Set up QEMU (for ARM64 builds on Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT && matrix.os != 'macos-15' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build dependencies (for real CI)
        if: ${{ !env.ACT }}
        run: ./scripts/setup-dependencies.sh

      - name: Build wheels (act - skip complex wheel building)
        if: ${{ env.ACT }}
        run: |
          echo "Skipping wheel building in act environment"
          echo "Reason: manylinux containers have limited build tools"
          echo "Wheel building works correctly on real GitHub Actions"
          mkdir -p wheelhouse
          echo "act test passed" > wheelhouse/.keep

      - name: Build wheels (CI - Linux)
        if: ${{ !env.ACT && runner.os == 'Linux' }}
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: "x86_64 aarch64"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import carla; print('Import successful')"
      
      - name: Build wheels (CI - macOS)
        if: ${{ !env.ACT && runner.os == 'macOS' }}
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*
          CIBW_ARCHS: "x86_64 arm64"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import carla; print('Import successful')"

      - name: Upload wheels
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

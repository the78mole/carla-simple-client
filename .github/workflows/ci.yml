name: CI

on:
  push:
  pull_request:

# Limit permissions for security
permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv

      - name: Install dev dependencies only
        run: uv pip install ruff black

      - name: Run linting
        run: |
          uv run ruff check .
          uv run black --check .

  build-cpp:
    name: Build C++ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        arch: [x86_64, arm64]

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git wget \
            libpng-dev libtiff-dev libjpeg-dev \
            python3-dev python3-pip \
            autoconf automake libtool

      - name: Setup Docker image for builds (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          docker build -f build-containers/x86_64-native-ubuntu-22.04/Dockerfile \
            -t carla-x86_64-native:ubuntu-22.04 \
            .

      - name: Setup Docker image for builds (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          docker build -f build-containers/x86_64-cross-arm64-ubuntu-22.04/Dockerfile \
            -t carla-arm64-builder:latest \
            .

      - name: Build C++ client (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          docker run --rm --user root -v "$PWD:/workspace" -w /workspace \
            carla-x86_64-native:ubuntu-22.04 \
            bash /workspace/build-containers/x86_64-native-ubuntu-22.04/build-native-examples.sh

      - name: Build C++ client (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          # Run all build steps in the Docker container
          docker run --rm --user root -v "$PWD:/workspace" -w /workspace \
            carla-arm64-builder:latest \
            bash -c '
              # Build dependencies
              bash /workspace/build-containers/x86_64-cross-arm64-ubuntu-22.04/build-arm64-deps.sh
              
              # Build LibCarla
              mkdir -p /workspace/build/aarch64/libcarla
              cd /workspace/build/aarch64/libcarla
              cmake /workspace/LibCarla/cmake \
                -DCMAKE_TOOLCHAIN_FILE=/workspace/cmake/toolchain-arm64.cmake \
                -DCMAKE_BUILD_TYPE=Client \
                -DCMAKE_INSTALL_PREFIX=/workspace/build/aarch64/libcarla/install \
                -DLIBCARLA_BUILD_RELEASE=ON \
                -DLIBCARLA_BUILD_DEBUG=OFF \
                -DLIBCARLA_BUILD_TEST=OFF \
                -DRPCLIB_INCLUDE_PATH=/workspace/deps/aarch64/install/rpclib-2.2.1/include \
                -DBOOST_INCLUDE_PATH=/workspace/deps/aarch64/install/boost-1.84.0/include \
                -DRECAST_INCLUDE_PATH=/workspace/deps/aarch64/install/recast-1.6.0/include \
                -DLIBPNG_INCLUDE_PATH=/workspace/deps/aarch64/install/libpng-1.6.37/include \
                -G Ninja
              ninja install
              
              # Build third-party
              mkdir -p /workspace/build/aarch64/third-party
              cd /workspace/build/aarch64/third-party
              aarch64-linux-gnu-g++ -std=c++14 -fPIC -O3 -DNDEBUG \
                -c /workspace/LibCarla/source/third-party/odrSpiral/odrSpiral.cpp -o odrSpiral.o
              aarch64-linux-gnu-g++ -std=c++14 -fPIC -O3 -DNDEBUG \
                -c /workspace/LibCarla/source/third-party/pugixml/pugixml.cpp -o pugixml.o
              aarch64-linux-gnu-ar rcs libcarla_third_party.a odrSpiral.o pugixml.o
              
              # Build example client
              mkdir -p /workspace/build/aarch64/cpp_client
              cd /workspace/build/aarch64/cpp_client
              aarch64-linux-gnu-g++ -std=c++14 -pthread -fPIC -O3 -DNDEBUG \
                -DBOOST_ERROR_CODE_HEADER_ONLY \
                -I/workspace/build/aarch64/libcarla/install/include \
                -I/workspace/deps/aarch64/install/rpclib-2.2.1/include \
                -I/workspace/deps/aarch64/install/boost-1.84.0/include \
                -I/workspace/deps/aarch64/install/recast-1.6.0/include \
                -o cpp_client /workspace/examples/cpp_client/main.cpp \
                /workspace/build/aarch64/libcarla/install/lib/libcarla_client.a \
                /workspace/build/aarch64/third-party/libcarla_third_party.a \
                /workspace/deps/aarch64/install/rpclib-2.2.1/lib/librpc.a \
                /workspace/deps/aarch64/install/boost-1.84.0/lib/libboost_filesystem.a \
                /workspace/deps/aarch64/install/boost-1.84.0/lib/libboost_system.a \
                /workspace/deps/aarch64/install/libpng-1.6.37/lib/libpng.a \
                -lz
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: cpp-client-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build/x86_64/cpp_client/cpp_client
            build/aarch64/cpp_client/cpp_client

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15]

    steps:
      - name: Skip macOS in act
        if: ${{ env.ACT && matrix.os == 'macos-15' }}
        run: |
          echo "Skipping macOS build in act environment"
          exit 0

      - uses: actions/checkout@v6
        if: ${{ !env.ACT || matrix.os != 'macos-15' }}

      - name: Set up QEMU (for ARM64 builds on Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build dependencies (Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT }}
        run: ./scripts/setup-dependencies.sh

      - name: Build Docker image (Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT }}
        run: docker build -t carla-x86_64-native:ubuntu-22.04 -f build-containers/x86_64-native-ubuntu-22.04/Dockerfile .

      - name: Build wheels (Linux)
        if: ${{ runner.os == 'Linux' && !env.ACT }}
        run: |
          # Build dependencies and LibCarla first
          docker run --rm --user root -v "$PWD:/workspace" -w /workspace \
            carla-x86_64-native:ubuntu-22.04 \
            bash /workspace/build-containers/x86_64-native-ubuntu-22.04/build-native-examples.sh
          # Now build the Python wheel
          docker run --rm --user root -v "$PWD:/workspace" -w /workspace \
            carla-x86_64-native:ubuntu-22.04 \
            bash -c 'python3 -m pip install --upgrade pip build wheel && python3 -m build --wheel'

      - name: Build wheels (act - skip complex wheel building)
        if: ${{ env.ACT }}
        run: |
          echo "Skipping wheel building in act environment"
          mkdir -p wheelhouse
          echo "act test passed" > wheelhouse/.keep
      
      # macOS dependency build temporarily disabled - Python header detection issues
      # - name: Build dependencies (macOS)
      #   if: ${{ !env.ACT && runner.os == 'macOS' }}
      #   run: ./scripts/setup-dependencies.sh

      - name: Build wheels (macOS)
        if: ${{ !env.ACT && runner.os == 'macOS' }}
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*
          CIBW_ARCHS: "arm64"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BEFORE_ALL_MACOS: |
            brew install ninja || true
            ./scripts/setup-dependencies.sh
          CIBW_TEST_COMMAND: python -c "import carla; print('Import successful')"

      - name: Upload wheels (Linux)
        if: ${{ !env.ACT && runner.os == 'Linux' }}
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

      - name: Upload wheels (macOS)
        if: ${{ !env.ACT && runner.os == 'macOS' }}
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
